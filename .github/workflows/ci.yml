name: CI

on:
  push:
    branches: ['main']
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'

jobs:
  quality:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ultimate_template
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ultimate_template"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Dependency audit
        run: npm run audit:deps

      - name: Check formatting
        run: npm run format:check

      - name: Check docs
        run: npm run docs:check

      - name: Validate Kubernetes overlays
        run: |
          kubectl kustomize infra/k8s/base > /dev/null
          kubectl kustomize infra/k8s/overlays/staging > /dev/null
          kubectl kustomize infra/k8s/overlays/production > /dev/null

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Migration smoke
        run: npm run prisma:migrate:deploy

      - name: Seed smoke
        run: npm run seed

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify clean worktree after build
        run: git diff --exit-code

      - name: Browser smoke
        run: npm run test:e2e

  perf-smoke:
    runs-on: ubuntu-latest
    needs: quality
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ultimate_template
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ultimate_template"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Setup database
        run: |
          npm run prisma:migrate:deploy
          npm run seed

      - name: Start API
        run: nohup node ./scripts/with-perf-env.mjs npm run start --workspace=@apps/api > api.log 2>&1 &

      - name: Start web
        run: nohup node ./scripts/with-perf-env.mjs npm run start --workspace=@apps/web -- --hostname 127.0.0.1 --port 3000 > web.log 2>&1 &

      - name: Wait for readiness
        run: |
          node ./scripts/wait-for-http.mjs http://127.0.0.1:4000/api/health 120000
          node ./scripts/wait-for-http.mjs http://127.0.0.1:3000 120000

      - name: Run blocking perf smoke
        run: npm run test:perf:smoke

  windows-validation:
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'schedule'
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
