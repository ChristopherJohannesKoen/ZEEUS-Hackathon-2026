name: Perf Smoke

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * *'

jobs:
  perf-smoke:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ultimate_template
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ultimate_template"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Setup database
        run: |
          npm run prisma:migrate:deploy
          npm run seed

      - name: Start API
        run: nohup node ./scripts/with-perf-env.mjs npm run start --workspace=@apps/api > api.log 2>&1 &

      - name: Start web
        run: nohup node ./scripts/with-perf-env.mjs npm run start --workspace=@apps/web -- --hostname 127.0.0.1 --port 3000 > web.log 2>&1 &

      - name: Wait for readiness
        run: |
          node ./scripts/wait-for-http.mjs http://127.0.0.1:4000/api/health 120000
          node ./scripts/wait-for-http.mjs http://127.0.0.1:3000 120000

      - name: Run perf smoke
        run: npm run test:perf:smoke
