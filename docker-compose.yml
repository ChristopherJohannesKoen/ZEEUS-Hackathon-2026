services:
  db:
    image: postgres:16-alpine
    container_name: zeeus-assessment-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-zeeus_assessment}
    ports:
      - '${DB_PORT:-5432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-zeeus_assessment}'
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      APP_ENV: ${APP_ENV:-local}
      APP_URL: ${APP_URL:-http://localhost:3000}
      API_ORIGIN: http://api:4000
      API_PORT: ${API_PORT:-4000}
      API_PREFIX: ${API_PREFIX:-api}
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-zeeus_assessment}?schema=public
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-zeeus_assessment_session}
      SESSION_COOKIE_ENCRYPTION_KEY: ${SESSION_COOKIE_ENCRYPTION_KEY:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
      SSO_STATE_ENCRYPTION_KEY: ${SSO_STATE_ENCRYPTION_KEY:-abcdef0123456789abcdef0123456789abcdef0123456789abcdef0123456789}
      ARGON2_MEMORY_COST: ${ARGON2_MEMORY_COST:-19456}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-120}
      SESSION_ROTATION_MS: ${SESSION_ROTATION_MS:-43200000}
      SESSION_TOUCH_INTERVAL_MS: ${SESSION_TOUCH_INTERVAL_MS:-600000}
      SESSION_MAX_ACTIVE: ${SESSION_MAX_ACTIVE:-5}
      OWNER_STEP_UP_WINDOW_MS: ${OWNER_STEP_UP_WINDOW_MS:-900000}
      IDEMPOTENCY_TTL_SECONDS: ${IDEMPOTENCY_TTL_SECONDS:-86400}
      IDEMPOTENCY_CLEANUP_INTERVAL_MS: ${IDEMPOTENCY_CLEANUP_INTERVAL_MS:-900000}
      IDEMPOTENCY_CLEANUP_BATCH_SIZE: ${IDEMPOTENCY_CLEANUP_BATCH_SIZE:-500}
      AUDIT_LOG_RETENTION_DAYS: ${AUDIT_LOG_RETENTION_DAYS:-365}
      SESSION_RETENTION_DAYS: ${SESSION_RETENTION_DAYS:-30}
      PASSWORD_RESET_RETENTION_DAYS: ${PASSWORD_RESET_RETENTION_DAYS:-30}
      IDEMPOTENCY_RETENTION_DAYS: ${IDEMPOTENCY_RETENTION_DAYS:-7}
      EXPORT_SYNC_LIMIT: ${EXPORT_SYNC_LIMIT:-5000}
      EXPOSE_DEV_RESET_DETAILS: ${EXPOSE_DEV_RESET_DETAILS:-false}
      ARTIFACTS_DIR: /app/.artifacts
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-}
      ALLOW_MISSING_ORIGIN_FOR_DEV: ${ALLOW_MISSING_ORIGIN_FOR_DEV:-false}
      ENTERPRISE_IDENTITY_ENABLED: ${ENTERPRISE_IDENTITY_ENABLED:-false}
      ENTERPRISE_DEFAULT_PROVIDER_SLUG: ${ENTERPRISE_DEFAULT_PROVIDER_SLUG:-}
      BREAK_GLASS_LOCAL_LOGIN_ENABLED: ${BREAK_GLASS_LOCAL_LOGIN_ENABLED:-false}
      OIDC_PROVIDER_SLUG: ${OIDC_PROVIDER_SLUG:-}
      OIDC_PROVIDER_DISPLAY_NAME: ${OIDC_PROVIDER_DISPLAY_NAME:-}
      OIDC_ISSUER: ${OIDC_ISSUER:-}
      OIDC_AUTHORIZATION_ENDPOINT: ${OIDC_AUTHORIZATION_ENDPOINT:-}
      OIDC_TOKEN_ENDPOINT: ${OIDC_TOKEN_ENDPOINT:-}
      OIDC_JWKS_URI: ${OIDC_JWKS_URI:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      OIDC_SCOPES: ${OIDC_SCOPES:-openid,profile,email}
      OIDC_VERIFIED_DOMAINS: ${OIDC_VERIFIED_DOMAINS:-}
      OIDC_GROUP_CLAIM: ${OIDC_GROUP_CLAIM:-groups}
      OIDC_EMAIL_CLAIM: ${OIDC_EMAIL_CLAIM:-email}
      OIDC_SUBJECT_CLAIM: ${OIDC_SUBJECT_CLAIM:-sub}
      OIDC_GROUP_ROLE_MAPPINGS: ${OIDC_GROUP_ROLE_MAPPINGS:-}
      SAML_PROVIDER_SLUG: ${SAML_PROVIDER_SLUG:-}
      SAML_PROVIDER_DISPLAY_NAME: ${SAML_PROVIDER_DISPLAY_NAME:-}
      SAML_SSO_URL: ${SAML_SSO_URL:-}
      SAML_ENTITY_ID: ${SAML_ENTITY_ID:-}
      SAML_CERTIFICATE_PEM: ${SAML_CERTIFICATE_PEM:-}
      SAML_VERIFIED_DOMAINS: ${SAML_VERIFIED_DOMAINS:-}
      SAML_GROUP_ATTRIBUTE: ${SAML_GROUP_ATTRIBUTE:-groups}
      SAML_EMAIL_ATTRIBUTE: ${SAML_EMAIL_ATTRIBUTE:-email}
      SAML_SUBJECT_ATTRIBUTE: ${SAML_SUBJECT_ATTRIBUTE:-NameID}
      SAML_GROUP_ROLE_MAPPINGS: ${SAML_GROUP_ROLE_MAPPINGS:-}
      SCIM_BEARER_TOKEN: ${SCIM_BEARER_TOKEN:-}
      SEED_OWNER_EMAIL: ${SEED_OWNER_EMAIL:-owner@example.com}
      SEED_OWNER_PASSWORD: ${SEED_OWNER_PASSWORD:-ChangeMe123!}
      FEATURE_EMAIL: ${FEATURE_EMAIL:-false}
      FEATURE_STORAGE: ${FEATURE_STORAGE:-false}
      FEATURE_CACHE: ${FEATURE_CACHE:-false}
      FEATURE_OBSERVABILITY: ${FEATURE_OBSERVABILITY:-false}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - '${API_PORT:-4000}:4000'
    volumes:
      - artifacts_data:/app/.artifacts
    command: >-
      sh -c "
      attempts=0;
      until npm run prisma:migrate:deploy --workspace=@packages/db; do
        attempts=$$((attempts + 1));
        if [ $$attempts -ge 20 ]; then
          exit 1;
        fi;
        echo 'Database not ready for migrations yet. Retrying...';
        sleep 2;
      done &&
      npm run seed --workspace=@packages/db &&
      node apps/api/dist/main.js"
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:4000/api/health >/dev/null']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        API_ORIGIN: http://api:4000
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      APP_ENV: ${APP_ENV:-local}
      APP_URL: ${APP_URL:-http://localhost:3000}
      API_ORIGIN: http://api:4000
      WEB_PORT: ${WEB_PORT:-3000}
    depends_on:
      api:
        condition: service_healthy
    ports:
      - '${WEB_PORT:-3000}:3000'

volumes:
  postgres_data:
  artifacts_data:
