apiVersion: v1
kind: ConfigMap
metadata:
  name: ultimate-template-api-config
data:
  NODE_ENV: 'production'
  APP_ENV: 'production'
  APP_URL: 'https://app.example.com'
  API_ORIGIN: 'https://api.example.com'
  API_PORT: '4000'
  API_PREFIX: 'api'
  SESSION_COOKIE_NAME: 'ultimate_template_session'
  RATE_LIMIT_WINDOW_MS: '60000'
  RATE_LIMIT_MAX: '120'
  SESSION_ROTATION_MS: '43200000'
  SESSION_TOUCH_INTERVAL_MS: '600000'
  SESSION_MAX_ACTIVE: '5'
  OWNER_STEP_UP_WINDOW_MS: '900000'
  IDEMPOTENCY_TTL_SECONDS: '86400'
  IDEMPOTENCY_CLEANUP_INTERVAL_MS: '900000'
  IDEMPOTENCY_CLEANUP_BATCH_SIZE: '500'
  AUDIT_LOG_RETENTION_DAYS: '365'
  SESSION_RETENTION_DAYS: '30'
  PASSWORD_RESET_RETENTION_DAYS: '30'
  IDEMPOTENCY_RETENTION_DAYS: '7'
  EXPORT_SYNC_LIMIT: '5000'
  EXPOSE_DEV_RESET_DETAILS: 'false'
  ALLOW_MISSING_ORIGIN_FOR_DEV: 'false'
  ENTERPRISE_IDENTITY_ENABLED: 'true'
  ENTERPRISE_DEFAULT_PROVIDER_SLUG: 'enterprise-oidc'
  BREAK_GLASS_LOCAL_LOGIN_ENABLED: 'false'
  OIDC_PROVIDER_SLUG: 'enterprise-oidc'
  OIDC_PROVIDER_DISPLAY_NAME: 'Corporate SSO'
  OIDC_ISSUER: 'https://idp.example.com'
  OIDC_SCOPES: 'openid,profile,email'
  OIDC_VERIFIED_DOMAINS: 'example.com'
  OIDC_GROUP_CLAIM: 'groups'
  OIDC_EMAIL_CLAIM: 'email'
  OIDC_SUBJECT_CLAIM: 'sub'
  OIDC_GROUP_ROLE_MAPPINGS: 'enterprise-admins:admin,enterprise-members:member'
  SAML_PROVIDER_SLUG: ''
  SAML_PROVIDER_DISPLAY_NAME: ''
  SAML_SSO_URL: ''
  SAML_ENTITY_ID: ''
  SAML_VERIFIED_DOMAINS: ''
  SAML_GROUP_ATTRIBUTE: 'groups'
  SAML_EMAIL_ATTRIBUTE: 'email'
  SAML_SUBJECT_ATTRIBUTE: 'NameID'
  SAML_GROUP_ROLE_MAPPINGS: ''
  FEATURE_EMAIL: 'false'
  FEATURE_STORAGE: 'false'
  FEATURE_CACHE: 'false'
  FEATURE_OBSERVABILITY: 'false'
