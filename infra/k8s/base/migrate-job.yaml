apiVersion: batch/v1
kind: Job
metadata:
  name: zeeus-assessment-prisma-migrate
spec:
  backoffLimit: 2
  template:
    metadata:
      labels:
        job: zeeus-assessment-prisma-migrate
    spec:
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: migrate
          image: ghcr.io/example/zeeus-assessment-api:latest
          command: ['npm', 'run', 'prisma:migrate:deploy', '--workspace=@packages/db']
          envFrom:
            - configMapRef:
                name: zeeus-assessment-api-config
            - secretRef:
                name: zeeus-assessment-secrets
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ['ALL']
            readOnlyRootFilesystem: true
