apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ultimate-template
spec:
  tls:
    - hosts:
        - staging-app.example.com
        - staging-api.example.com
      secretName: ultimate-template-staging-tls
  rules:
    - host: staging-app.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ultimate-template-web
                port:
                  number: 3000
    - host: staging-api.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: ultimate-template-api
                port:
                  number: 4000
